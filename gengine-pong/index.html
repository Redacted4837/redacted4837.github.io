<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEngine - Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
  }
  canvas { display: block; width: 100%; height: 100%; image-rendering: auto; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  #load-text { font-size: 24px; margin-bottom: 16px; font-family: monospace; color: #fff; }
  #load-bar-wrap { width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  #load-bar { height: 100%; width: 0%; background: #fff; transition: width 0.1s; }
  #error-box {
    display: none; position: absolute; inset: 0;
    align-items: center; justify-content: center;
    background: #000; padding: 40px;
  }
  #error-box pre { color: #f44; font-size: 14px; white-space: pre-wrap; max-width: 800px; font-family: monospace; }
</style>
</head>
<body>
<div id="container">
  <canvas id="canvas" width="1280" height="720"></canvas>
  <div id="overlay">
    <div id="load-text">Loading GEngine...</div>
    <div id="load-bar-wrap"><div id="load-bar"></div></div>
  </div>
  <div id="error-box"><pre id="error-text"></pre></div>
</div>

<script>
window.addEventListener('error', function(e) {
  document.getElementById('error-text').textContent = e.message || e.error || 'Unknown error';
  document.getElementById('error-box').style.display = 'flex';
  return false;
});

var loadBar = document.getElementById('load-bar');
var loadText = document.getElementById('load-text');
var overlay = document.getElementById('overlay');

var Module = {
  canvas: document.getElementById('canvas'),
  locateFile: function(path, prefix) { return path; },
  setStatus: function(text) {
    var m = text.match(/([\d.]+)\/([\d.]+)/);
    if (m) {
      loadBar.style.width = Math.round(parseFloat(m[1])/parseFloat(m[2])*100) + '%';
      loadText.textContent = 'Loading...';
    } else if (text === '') {
      overlay.style.display = 'none';
    }
  },
  onRuntimeInitialized: function() { overlay.style.display = 'none'; },
  onAbort: function(reason) {
    document.getElementById('error-text').textContent = 'Aborted: ' + reason;
    document.getElementById('error-box').style.display = 'flex';
  }
};
</script>
<script src="gengine.js"></script>
</body>
</html>
